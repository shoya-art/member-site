<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>講義 | 復縁サポート</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0D0D0D;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      min-height: 100vh;
      padding-bottom: 100px;
    }
    .header {
      background: #1A1A1A;
      padding: 20px;
      border-bottom: 1px solid #2A2A2A;
    }
    .header h1 { font-size: 17px; font-weight: 700; }
    .content { padding: 20px; max-width: 600px; margin: 0 auto; }

    .coming-soon {
      text-align: center;
      padding: 80px 20px;
    }
    .coming-soon-icon { font-size: 56px; margin-bottom: 20px; }
    .coming-soon h2 { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
    .coming-soon p { font-size: 14px; color: #888; line-height: 1.8; }

    .lecture-week { margin-bottom: 28px; }
    .week-label {
      font-size: 12px;
      font-weight: 700;
      color: #E8637A;
      letter-spacing: 1px;
      margin-bottom: 12px;
      padding-left: 4px;
    }
    .lecture-card {
      background: #1A1A1A;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: background .2s;
      border: 1px solid #2A2A2A;
    }
    .lecture-card:hover { background: #222; }
    .lecture-card.completed { border-color: #4CAF50; }
    .lecture-num {
      width: 36px;
      height: 36px;
      background: #2A2A2A;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #888;
      flex-shrink: 0;
    }
    .lecture-card.completed .lecture-num { background: #1A3A2A; color: #6FCF97; }
    .lecture-info { flex: 1; }
    .lecture-title { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
    .lecture-meta { font-size: 12px; color: #666; }
    .lecture-arrow { font-size: 18px; color: #555; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1A1A1A; border-top: 1px solid #2A2A2A;
      display: flex; padding: 10px 0 20px;
    }
    .nav-item { flex: 1; text-align: center; padding: 8px; cursor: pointer; color: #555; text-decoration: none; }
    .nav-item.active { color: #E8637A; }
    .nav-icon { font-size: 22px; }
    .nav-label { font-size: 10px; margin-top: 2px; }
  </style>
</head>
